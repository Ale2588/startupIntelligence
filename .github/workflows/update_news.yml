name: Update News Daily

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install datapizza-ai datapizza-ai-clients-anthropic datapizza-ai-tools-duckduckgo

      - name: Run news update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_news.py

      - name: Commit updated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update news_data.json"
          file_pattern: news_data.json
